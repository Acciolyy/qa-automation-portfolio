{% extends 'base.html' %}

{% block titulo %}Cadastre-se{% endblock %}

{% block conteudo %}
<div class="card card-estreito">
    <h1>Cadastre-se</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="rodape-form">
            <button type="submit">Cadastrar</button>
        </div>
    </form>
    <p>Já tem conta? <a href="{% url 'login' %}">Entrar</a></p>
</div>
{% endblock %}
