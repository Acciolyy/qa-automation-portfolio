{% extends 'base.html' %}

{% block titulo %}Login{% endblock %}

{% block conteudo %}
<div class="card card-estreito">
    <h1>Login</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="rodape-form">
            <button type="submit">Entrar</button>
        </div>
    </form>
    <p>Não tem conta? <a href="{% url 'signup' %}">Cadastre-se</a></p>
</div>
{% endblock %}
