{% extends 'base.html' %}

{% block titulo %}{% if form.instance.pk %}Editar produto{% else %}Novo produto{% endif %}{% endblock %}

{% block conteudo %}
<div class="card">
    <h1>{% if form.instance.pk %}Editar produto{% else %}Novo produto{% endif %}</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="rodape-form">
            <button type="submit">Salvar</button>
            <a href="{% url 'produto_list' %}">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
