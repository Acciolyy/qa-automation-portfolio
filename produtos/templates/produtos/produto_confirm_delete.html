{% extends 'base.html' %}

{% block titulo %}Excluir produto{% endblock %}

{% block conteudo %}
<div class="card card-estreito">
    <h1>Excluir produto</h1>
    <p>Tem certeza que deseja excluir <strong>{{ produto.nome }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <div class="rodape-form">
            <button type="submit" class="btn-perigo">Sim, excluir</button>
            <a href="{% url 'produto_list' %}">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
